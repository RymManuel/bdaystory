<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Browser Tab Title -->
    <title>Happy Birthday, Krishna ❤️</title>

    <!-- SEO -->
    <meta
      name="description"
      content="Across infinite universes and endless timelines, I'd still choose you every single time."
    />
    <meta
      name="keywords"
      content="birthday, love, surprise, multiverse, happy birthday"
    />
    <meta name="theme-color" content="#000000" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/placeholder.svg" />

    <!-- Open Graph / Instagram / Facebook -->
    <meta
      property="og:title"
      content="A Birthday Surprise for Krishna ❤️"
    />

    <meta
      property="og:description"
      content="In every universe, in every timeline, I'd still find my way back to you."
    />

    <meta property="og:type" content="website" />

    <!-- Replace with your actual Vercel URL -->
    <meta
      property="og:url"
      content="https://bdaystory.vercel.app/"
    />

    <!-- IMPORTANT: Use an absolute URL -->
    <meta
      property="og:image"
      content="https://bdaystory.vercel.app/og.jpg"
    />

    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />

    <meta
      name="twitter:title"
      content="A Birthday Surprise for Krishna ❤️"
    />

    <meta
      name="twitter:description"
      content="In every universe, in every timeline, I'd still find my way back to you."
    />

    <meta
      name="twitter:image"
      content="https://bdaystory.vercel.app/og.jpg"
    />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
